<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>加入旅程 — 熊好算</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F6F1EA;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #FFFDF9;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #FFF0E6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 36px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #2C2420;
      margin-bottom: 8px;
    }
    p {
      font-size: 15px;
      color: #6B5E56;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #E8763A;
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .btn-secondary {
      background: transparent;
      color: #E8763A;
      border: 1.5px solid #E8763A;
    }
    .status {
      font-size: 13px;
      color: #A89B91;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🐻</div>
    <h1>你被邀請加入旅程</h1>
    <p>點擊下方按鈕，透過熊好算與夥伴一起記帳。</p>

    <a class="btn" id="openApp" href="#">在 App 中開啟</a>
    <a class="btn btn-secondary" id="downloadBtn"
       href="https://apps.apple.com/app/id6761038388">
      下載熊好算
    </a>

    <p class="status" id="status">正在嘗試開啟 App…</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('status').textContent = '連結無效或已過期。';
      document.getElementById('openApp').style.display = 'none';
    } else {
      const deepLink = 'travelbudget://join?token=' + encodeURIComponent(token);
      document.getElementById('openApp').href = deepLink;

      // Auto-attempt to open the app
      window.location.href = deepLink;

      // After 2.5s, if still on page, assume app not installed
      setTimeout(function () {
        document.getElementById('status').textContent =
          '若尚未安裝熊好算，請先下載再重新開啟連結。';
      }, 2500);
    }
  </script>
</body>
</html>
